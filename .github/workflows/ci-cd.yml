name: Student Portal CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # In a real scenario, you would log in to a registry here (like Docker Hub or GitHub Container Registry)
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t student-portal-app:${{ github.sha }} .

    # In a real scenario, you would push the Docker image
    # - name: Push Docker Image
    #   run: docker push student-portal-app:${{ github.sha }}

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    
    steps:
    - name: Simulate Deployment
      run: |
        echo "Simulating deployment to production environment..."
        echo "Deploying Docker image version: ${{ github.sha }}"
        echo "Target: Simulated Application Server"
        echo "Status: Deployment Successful!"
