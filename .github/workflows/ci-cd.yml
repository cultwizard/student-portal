name: Student Portal CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Express server dependencies
      run: npm ci

    - name: Ensure React client compiles correctly
      run: npm run build:client

    - name: Run Express Server Tests
      run: npm test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # In a real scenario, you would log in to a registry here
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2

    - name: Execute Multi-Stage Docker Build
      run: docker build -t student-portal-app:${{ github.sha }} .

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    
    steps:
    - name: Simulate Deployment
      run: |
        echo "Simulating deployment to production environment..."
        echo "Deploying advanced multi-stage Docker image version: ${{ github.sha }}"
        echo "Status: Deployment Successful!"
